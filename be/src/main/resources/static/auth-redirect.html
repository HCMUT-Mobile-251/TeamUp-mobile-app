<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập thành công</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: rgba(255, 0, 0, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .manual-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Đăng nhập thành công!</h1>
        <div class="spinner"></div>
        <p id="status">Đang chuyển hướng về ứng dụng...</p>
        <div id="error" class="error" style="display: none;"></div>
        <a id="manual-link" class="manual-link" style="display: none;" href="#">Mở ứng dụng thủ công</a>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');
        const manualLinkEl = document.getElementById('manual-link');

        async function handleAuthRedirect() {
            try {
                // Lấy code từ URL params
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');

                if (!code) {
                    throw new Error('Không tìm thấy authorization code');
                }

                statusEl.textContent = 'Đang xác thực với server...';

                // Gọi API để lấy token
                const response = await fetch(`/auth/login?code=${code}`);
                const data = await response.json();

                if (data.code !== 200) {
                    throw new Error(data.message || 'Đăng nhập thất bại');
                }

                const token = data.result.accessToken;
                const userId = data.result.user.userId;

                statusEl.textContent = 'Đang mở ứng dụng...';

                // Lưu token và userId vào localStorage cho web
                localStorage.setItem('auth_token', token);
                localStorage.setItem('user_id', userId);

                // Kiểm tra xem đang chạy trên web hay mobile
                const isWeb = window.location.hostname === 'localhost' || window.location.hostname.includes('127.0.0.1');

                if (isWeb) {
                    // Nếu là web, redirect với token trong URL hash để tránh vấn đề Same-Origin Policy
                    statusEl.textContent = 'Đang chuyển về trang chủ...';

                    console.log('Token:', token);
                    console.log('UserId:', userId);

                    // Sử dụng URL hash để truyền token (không gửi lên server)
                    const redirectUrl = `http://localhost:8081/#auth?token=${encodeURIComponent(token)}&userId=${encodeURIComponent(userId)}`;
                    window.location.href = redirectUrl;
                } else {
                    // Nếu là mobile, dùng deep link
                    const deepLink = `teamup://auth?token=${encodeURIComponent(token)}&userId=${encodeURIComponent(userId)}`;

                    // Cập nhật manual link
                    manualLinkEl.href = deepLink;
                    manualLinkEl.style.display = 'inline-block';

                    // Thử redirect tự động
                    window.location.href = deepLink;

                    // Hiển thị link thủ công sau 2 giây nếu không tự động redirect
                    setTimeout(() => {
                        statusEl.textContent = 'Nếu ứng dụng không tự động mở, hãy nhấn nút bên dưới:';
                    }, 2000);
                }

            } catch (error) {
                console.error('Auth redirect error:', error);
                errorEl.textContent = `Lỗi: ${error.message}`;
                errorEl.style.display = 'block';
                statusEl.textContent = 'Đăng nhập thất bại';
            }
        }

        // Chạy khi trang load
        handleAuthRedirect();
    </script>
</body>
</html>
