<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập thành công</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: rgba(255, 0, 0, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .manual-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Đăng nhập thành công!</h1>
        <div class="spinner"></div>
        <p id="status">Đang chuyển hướng về ứng dụng...</p>
        <div id="error" class="error" style="display: none;"></div>
        <a id="manual-link" class="manual-link" style="display: none;" href="#">Mở ứng dụng thủ công</a>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');
        const manualLinkEl = document.getElementById('manual-link');

        async function handleAuthRedirect() {
            try {
                // Lấy token, userId và state từ URL params (backend đã xử lý và redirect về đây)
                const urlParams = new URLSearchParams(window.location.search);
                const token = urlParams.get('token');
                const userId = urlParams.get('userId');
                const error = urlParams.get('error');
                const state = urlParams.get('state');

                // Kiểm tra nếu có lỗi từ backend
                if (error) {
                    throw new Error(decodeURIComponent(error));
                }

                // Kiểm tra token và userId
                if (!token || !userId) {
                    throw new Error('Không nhận được thông tin đăng nhập từ server');
                }

                statusEl.textContent = 'Đang mở ứng dụng...';

                console.log('Received token:', token.substring(0, 20) + '...');
                console.log('Received userId:', userId);
                console.log('State parameter:', state);

                // Parse redirectUri từ state parameter
                let redirectUri = null;
                if (state) {
                    try {
                        const stateData = JSON.parse(decodeURIComponent(state));
                        redirectUri = stateData.redirectUri;
                        console.log('Parsed redirectUri from state:', redirectUri);
                    } catch (e) {
                        console.log('Failed to parse state:', e);
                    }
                }

                // Tạo deep link
                let deepLink;
                if (redirectUri) {
                    // Dùng redirectUri từ app (ví dụ: exp://192.168.1.10:8081/--/auth)
                    // Thêm query params vào
                    deepLink = `${redirectUri}?token=${encodeURIComponent(token)}&userId=${encodeURIComponent(userId)}`;
                } else {
                    // Fallback: tự detect
                    const currentHost = window.location.hostname;
                    deepLink = `exp://${currentHost}:8081/--/auth?token=${encodeURIComponent(token)}&userId=${encodeURIComponent(userId)}`;
                }

                console.log('Deep link:', deepLink);

                // Cập nhật manual link
                manualLinkEl.href = deepLink;
                manualLinkEl.textContent = 'Mở ứng dụng';

                // Thử gửi message về React Native WebView nếu có
                try {
                    if (window.ReactNativeWebView) {
                        window.ReactNativeWebView.postMessage(JSON.stringify({
                            type: 'AUTH_SUCCESS',
                            token,
                            userId
                        }));
                        console.log('Sent message to ReactNativeWebView');

                        // Nếu gửi message thành công, không cần redirect
                        statusEl.textContent = 'Đăng nhập thành công! Đang quay về ứng dụng...';
                        return;
                    }
                } catch (e) {
                    console.log('Cannot post message to React Native:', e);
                }

                // Redirect về deep link
                window.location.href = deepLink;

                // Hiển thị options sau 1 giây
                setTimeout(() => {
                    statusEl.textContent = 'Nếu ứng dụng không tự động mở, hãy thử:';
                    manualLinkEl.style.display = 'inline-block';

                    // Thêm nút để copy deep link
                    const copyBtn = document.createElement('button');
                    copyBtn.textContent = 'Copy link';
                    copyBtn.className = 'manual-link';
                    copyBtn.style.marginLeft = '10px';
                    copyBtn.onclick = () => {
                        navigator.clipboard.writeText(deepLink);
                        copyBtn.textContent = 'Đã copy!';
                    };
                    manualLinkEl.parentElement.appendChild(copyBtn);
                }, 1000);

            } catch (error) {
                console.error('Auth redirect error:', error);
                errorEl.textContent = `Lỗi: ${error.message}`;
                errorEl.style.display = 'block';
                statusEl.textContent = 'Đăng nhập thất bại';
            }
        }

        // Chạy khi trang load
        handleAuthRedirect();
    </script>
</body>
</html>
