name: Build
on:
  push:
    branches:
      - jest-testing
    paths:
      - 'fe/**'  # Chỉ trigger khi có thay đổi trong folder fe
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'fe/**'  # Chỉ trigger khi PR liên quan đến folder fe

jobs:
  sonarqube:
    name: SonarQube
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./fe  # Tất cả commands sẽ chạy trong folder fe
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./fe  # Chỉ định thư mục gốc cho SonarQube